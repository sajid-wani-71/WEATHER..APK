<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEATHER.APP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />
</head>

<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter City Name" spellcheck="false">
            <button><span class="material-symbols-outlined">
                    search
                </span></button>
        </div>
        <div class="weather">
            <img src="Screenshot 2026-06-28 152310.png" alt="weather icon" class="weather-icon" style="height: 130px; margin-top: 45px; border-radius: 5px;">
            <h1 class="temp">22°C</h1>
            <h2 class="city">srinagar</h2>
            <div class="details">
                <div class="col">
                    <img src="Screenshot 2026-06-28 154156.png" alt="Humidity" style="height: 60px; border-radius: 5px;">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                        </div>
                        </div>
                        <div class="col">
                            <img src="Screenshot 2026-06-28 154017.png" alt="Wind Speed" style="height: 60px; border-radius: 5px;">
                            <div>
                                <p class="wind">15 km/h</p>
                                <p>Wind Speed</p>
                            </div>
                        </div>
                    </div>
                </div>
<script src="script.js"></script>
</body>

</html>
